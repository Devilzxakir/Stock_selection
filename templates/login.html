<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockSense — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810; --bg2: #0c1020; --bg3: #131828; --border: #1e2840;
    --acc: #4f8ef7; --green: #22c55e; --red: #ef4444; --text: #e2e8f0; --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }
  .card { position: relative; z-index: 1; width: 100%; max-width: 420px; }
  .card-header { text-align: center; margin-bottom: 32px; }
  .card-header .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--acc); text-decoration: none; }
  .card-header h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; margin-top: 20px; }
  .card-header p { color: var(--muted); font-size: 14px; margin-top: 8px; }
  form { background: var(--bg3); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
  .error-msg { display: none; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); font-size: 13px; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif;
    outline: none; transition: border-color .2s;
  }
  .field input:focus { border-color: var(--acc); }
  .field input::placeholder { color: var(--muted); }
  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-primary { background: var(--acc); color: #fff; }
  .btn-primary:hover:not(:disabled) { opacity: .9; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer-text { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
  .footer-text a { color: var(--acc); text-decoration: none; }
  .footer-text a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <a href="/landing" class="logo">StockSense</a>
    <h1>Sign in to your account</h1>
    <p>Access your stock market analysis dashboard</p>
  </div>
  <form id="loginForm">
    <div class="error-msg" id="errorMsg"></div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary" id="submitBtn">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">Sign In</span>
    </button>
  </form>
  <p class="footer-text">Don't have an account? <a href="/register">Sign up</a></p>
</div>
<script>
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorMsg = document.getElementById('errorMsg');
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Signing in...';
    errorMsg.style.display = 'none';
    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(new FormData(this))
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = '/';
      } else {
        errorMsg.textContent = data.error || 'Invalid email or password';
        errorMsg.style.display = 'block';
      }
    } catch {
      errorMsg.textContent = 'An error occurred';
      errorMsg.style.display = 'block';
    }
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Sign In';
  });
</script>
</body>
</html>
