<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockSense — Smart Stock Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #050810;
    --bg2:      #0c1020;
    --bg3:      #131828;
    --border:   #1e2840;
    --acc:      #4f8ef7;
    --acc2:     #7c3aed;
    --green:    #22c55e;
    --red:      #ef4444;
    --amber:    #f59e0b;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --card:     #0f1629;
    --glow:     rgba(79,142,247,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BG ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── HERO ── */
  .hero {
    position: relative; z-index: 1;
    text-align: center;
    padding: 80px 24px 48px;
  }

  .logo-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.3);
    border-radius: 100px;
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--acc);
    margin-bottom: 28px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--acc); animation: pulse 2s infinite; }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(40px, 7vw, 72px);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e2e8f0 30%, #4f8ef7 70%, #7c3aed 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 17px;
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto 48px;
    line-height: 1.6;
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative; z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .search-box {
    display: flex;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }

  .search-box:focus-within {
    border-color: var(--acc);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.12), 0 0 40px rgba(79,142,247,0.08);
  }

  #searchInput {
    flex: 1;
    background: transparent;
    border: none; outline: none;
    padding: 18px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--text);
  }

  #searchInput::placeholder { color: var(--muted); }

  #searchBtn {
    background: var(--acc);
    border: none; cursor: pointer;
    padding: 18px 28px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
    transition: background .2s, transform .1s;
  }

  #searchBtn:hover { background: #3b7de8; }
  #searchBtn:active { transform: scale(0.97); }

  /* ── DROPDOWN ── */
  #dropdown {
    position: absolute; top: calc(100% + 8px); left: 24px; right: 24px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
  }

  .drop-item {
    padding: 14px 18px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    transition: background .15s;
  }

  .drop-item:last-child { border-bottom: none; }
  .drop-item:hover { background: rgba(79,142,247,0.08); }

  .drop-icon { font-size: 18px; }
  .drop-name { font-weight: 500; font-size: 15px; }
  .drop-url  { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  /* ── LOADER ── */
  #loader {
    display: none;
    text-align: center;
    padding: 80px 24px;
    position: relative; z-index: 1;
  }

  .spin-ring {
    width: 56px; height: 56px;
    border: 3px solid var(--border);
    border-top-color: var(--acc);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text { color: var(--muted); font-size: 14px; font-family: 'DM Mono', monospace; }

  /* ── RESULTS ── */
  #results {
    display: none;
    position: relative; z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .results-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
    margin-bottom: 32px;
  }

  .company-title {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .gen-time { color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; margin-top: 4px; }

  .btn-pdf {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: center; gap: 8px;
  }

  .btn-pdf:hover { border-color: var(--acc); color: var(--acc); background: rgba(79,142,247,0.06); }

  /* ── VERDICT BANNER ── */
  .verdict-banner {
    border-radius: 14px;
    padding: 20px 28px;
    margin-bottom: 28px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    border: 1px solid;
  }

  .verdict-banner.strong-buy { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.3); }
  .verdict-banner.buy        { background: rgba(34,197,94,0.06); border-color: rgba(34,197,94,0.25);}
  .verdict-banner.watch      { background: rgba(245,158,11,0.08);border-color: rgba(245,158,11,0.3);}
  .verdict-banner.hold       { background: rgba(245,158,11,0.06);border-color: rgba(245,158,11,0.25);}
  .verdict-banner.avoid      { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); }

  .verdict-label {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.01em;
  }

  .verdict-banner.strong-buy .verdict-label,
  .verdict-banner.buy .verdict-label        { color: var(--green); }
  .verdict-banner.watch .verdict-label,
  .verdict-banner.hold .verdict-label       { color: var(--amber); }
  .verdict-banner.avoid .verdict-label      { color: var(--red); }

  .verdict-score {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: var(--muted);
  }

  .verdict-score span { color: var(--text); font-weight: 700; }

  /* ── GRID LAYOUT ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-bottom: 20px; }
  @media(max-width:1024px){ .grid-3 { grid-template-columns:1fr 1fr; } }
  @media(max-width:768px){ .grid-2,.grid-3 { grid-template-columns:1fr; } }
  @media(max-width:480px){
    .hero { padding: 48px 16px 32px; }
    h1 { font-size: clamp(32px, 10vw, 40px); }
    .subtitle { font-size: 15px; }
    .search-wrap { padding: 0 16px; }
    #searchInput { padding: 14px 16px; font-size: 15px; }
    #searchBtn { padding: 14px 18px; font-size: 12px; }
    .company-title { font-size: 24px; }
    .verdict-label { font-size: 18px; }
    .verdict-score { font-size: 22px; }
    .val-stat-value { font-size: 18px; }
    .card { padding: 16px; }
    #results { padding: 24px 16px 48px; }
    .metric-grid { grid-template-columns: 1fr; }
    .metric-value { font-size: 16px; }
    .score-name { flex: 0 0 80px; font-size: 11px; }
    .model-row { grid-template-columns: 1fr 1fr; gap: 4px; }
    .model-formula { grid-column: 1 / -1; font-size: 10px; }
    .chart-table th, .chart-table td { padding: 6px 6px; font-size: 10px; }
    .results-header { flex-direction: column; }
    .btn-pdf { width: 100%; justify-content: center; }
    .verdict-banner { flex-direction: column; text-align: center; padding: 16px; }
    .val-hero { grid-template-columns: 1fr 1fr; }
    #results [style*="grid-template-columns: 1.8fr 1.5fr 2.5fr"] { grid-template-columns: 1fr 1fr !important; }
    #results [style*="grid-template-columns: 1.8fr 1.5fr 2.5fr"] > div { font-size: 8px !important; }
  }
  @media(max-width:400px){
    .val-hero { grid-template-columns: 1fr; }
    #results [style*="grid-template-columns: 1.8fr 1.5fr 2.5fr"] { grid-template-columns: 1fr !important; }
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(79,142,247,0.4), transparent);
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── METRIC GRID ── */
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .metric-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.04em; text-transform: uppercase; }

  .metric-value {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
  }

  .metric-value.green { color: var(--green); }
  .metric-value.red   { color: var(--red); }
  .metric-value.amber { color: var(--amber); }

  /* ── CHART TABLE ── */
  .chart-table { width: 100%; border-collapse: collapse; }
  .chart-table th, .chart-table td {
    padding: 8px 10px;
    font-size: 12px;
    text-align: right;
    border-bottom: 1px solid var(--border);
  }

  .chart-table th {
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    font-weight: 400;
    text-align: right;
  }

  .chart-table th:first-child, .chart-table td:first-child { text-align: left; }
  .chart-table td:first-child { color: var(--acc); font-weight: 600; font-size: 12px; font-family: 'DM Mono', monospace; }
  .chart-table tbody tr:last-child td { border-bottom: none; }

  /* ── SCORE BAR ── */
  .score-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .score-row:last-child { border-bottom: none; }

  .score-name { font-size: 13px; color: var(--text); flex: 0 0 140px; }

  .score-bar-wrap { flex: 1; height: 6px; background: var(--bg3); border-radius: 99px; overflow: hidden; }

  .score-bar-fill { height: 100%; border-radius: 99px; transition: width .8s cubic-bezier(.4,0,.2,1); }

  .score-bar-fill.green { background: linear-gradient(90deg, #16a34a, #22c55e); }
  .score-bar-fill.amber { background: linear-gradient(90deg, #d97706, #f59e0b); }
  .score-bar-fill.red   { background: linear-gradient(90deg, #b91c1c, #ef4444); }

  .score-num {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    min-width: 40px;
    text-align: right;
  }

  .score-num.green { color: var(--green); }
  .score-num.amber { color: var(--amber); }
  .score-num.red   { color: var(--red); }

  /* ── VALUATION ── */
  .val-hero {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  @media(max-width:600px){ .val-hero { grid-template-columns: 1fr 1fr; } }

  .val-stat {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .val-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }

  .val-stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
  }

  .val-stat-value.green { color: var(--green); }
  .val-stat-value.red   { color: var(--red); }
  .val-stat-value.amber { color: var(--amber); }
  .val-stat-value.neutral { color: var(--text); }

  .model-row {
    display: grid;
    grid-template-columns: 2fr 1.5fr 3fr;
    gap: 12px;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .model-row:last-child { border-bottom: none; }
  .model-row.total-row { background: rgba(79,142,247,0.06); border-radius: 10px; padding: 14px 12px; border: 1px solid rgba(79,142,247,0.2); margin-top: 8px; }

  .model-name { font-weight: 600; font-size: 13px; }
  .model-iv   { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }
  .model-iv.green { color: var(--green); }
  .model-iv.red   { color: var(--red); }
  .model-formula  { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; line-height: 1.4; }

  .val-verdict-strip {
    border-radius: 12px;
    padding: 16px 20px;
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    margin-top: 16px;
    border: 1px solid;
  }

  .val-verdict-strip.strong,
  .val-verdict-strip.mild    { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.3); color: var(--green); }
  .val-verdict-strip.fair    { background: rgba(245,158,11,0.08);border-color: rgba(245,158,11,0.3);color: var(--amber); }
  .val-verdict-strip.over,
  .val-verdict-strip.danger  { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); color: var(--red); }

  /* ── ERROR ── */
  .error-box {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 12px;
    padding: 20px;
    color: var(--red);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    margin: 20px auto;
    max-width: 680px;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 32px 0 14px;
    display: flex; align-items: center; gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ── SPARKBAR ── */
  .sparkbar-wrap { display: flex; align-items: flex-end; gap: 4px; height: 40px; margin-top: 8px; }
  .sparkbar { flex: 1; border-radius: 3px 3px 0 0; background: var(--acc); opacity: 0.7; transition: opacity .2s; min-width: 8px; }
  .sparkbar:hover { opacity: 1; }

  /* ── ANIMATE IN ── */
  .fade-in { animation: fadeIn .5s ease forwards; opacity: 0; }
  @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(12px); } }

  .fade-in:nth-child(1) { animation-delay: .05s; }
  .fade-in:nth-child(2) { animation-delay: .10s; }
  .fade-in:nth-child(3) { animation-delay: .15s; }
  .fade-in:nth-child(4) { animation-delay: .20s; }
  .fade-in:nth-child(5) { animation-delay: .25s; }

  /* ── RESPONSIVE OVERRIDES FOR INLINE GRIDS (JS-generated) ── */
  @media(max-width:768px){
    #results [style*="grid-template-columns:"] { grid-template-columns: 1fr !important; }
    #results [style*="flex: 2"] { flex: 1 1 100% !important; min-width: 0 !important; }
    .sparkbar-wrap { height: 28px; }
    .sparkbar { min-width: 4px; }
  }
  @media(max-width:480px){
    #results [style*="grid-template-columns:"] { grid-template-columns: 1fr !important; }
    #results [style*="display: flex"][style*="gap: 24px"] { flex-direction: column; gap: 12px !important; }
    .loan-table-wrap { overflow-x: auto; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="logo-badge"><span class="logo-dot"></span>Powered by Screener.in Data</div>
  <h1>StockSense</h1>
  <p class="subtitle">Deep fundamental analysis with 5-model valuation.<br>Undervalued or overvalued — know before you invest.</p>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Search company (e.g. Emmvee, Reliance, TCS...)" autocomplete="off">
    <button id="searchBtn">ANALYZE →</button>
  </div>
  <div id="dropdown"></div>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="spin-ring"></div>
  <div class="loader-text">Fetching data from Screener.in...</div>
</div>

<!-- ERROR -->
<div id="errorBox" class="error-box" style="display:none"></div>

<!-- RESULTS -->
<div id="results"></div>

<script>
let selectedSlug = null;
let selectedName = null;
let searchTimer  = null;

const input    = document.getElementById('searchInput');
const dropdown = document.getElementById('dropdown');
const loader   = document.getElementById('loader');
const results  = document.getElementById('results');
const errorBox = document.getElementById('errorBox');
const searchBtn= document.getElementById('searchBtn');

// ── SEARCH DEBOUNCE ──
input.addEventListener('input', () => {
  clearTimeout(searchTimer);
  selectedSlug = null;  // clear previous selection when typing
  selectedName = null;
  const q = input.value.trim();
  if (!q) { dropdown.style.display = 'none'; return; }
  searchTimer = setTimeout(() => fetchSuggestions(q), 300);
});

async function fetchSuggestions(q) {
  const res  = await fetch(`/api/search?q=${encodeURIComponent(q)}&_=${Date.now()}`);
  const data = await res.json();
  if (!data.length) { dropdown.style.display = 'none'; return; }
  dropdown.innerHTML = data.map(c => `
    <div class="drop-item" data-slug="${c.url.split('/').filter(Boolean)[1]}" data-name="${c.name}" data-url="${c.url}">
      <span class="drop-icon">📈</span>
      <div>
        <div class="drop-name">${c.name}</div>
        <div class="drop-url">${c.url}</div>
      </div>
    </div>`).join('');
  dropdown.style.display = 'block';
  dropdown.querySelectorAll('.drop-item').forEach(el => {
    el.addEventListener('click', () => {
      const slug = el.dataset.slug;
      selectedSlug = slug;
      selectedName = el.dataset.name;
      input.value  = el.dataset.name;
      dropdown.style.display = 'none';
      runAnalysis();
    });
  });
}

// ── SEARCH BUTTON ──
searchBtn.addEventListener('click', () => {
  if (selectedSlug) { runAnalysis(); return; }
  // try direct slug from input
  const q = input.value.trim();
  if (!q) return;
  fetchSuggestions(q).then(() => {
    const first = dropdown.querySelector('.drop-item');
    if (first) first.click();
  });
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') searchBtn.click();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) dropdown.style.display = 'none';
});

let liveTimer = null;

// ── RUN ANALYSIS ──
async function runAnalysis() {
  if (!selectedSlug) return;
  loader.style.display   = 'block';
  results.style.display  = 'none';
  errorBox.style.display = 'none';
  dropdown.style.display = 'none';
  clearInterval(liveTimer);

  try {
    const res  = await fetch(`/api/analyze?slug=${encodeURIComponent(selectedSlug)}&name=${encodeURIComponent(selectedName)}&_=${Date.now()}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    loader.style.display  = 'none';
    results.style.display = 'block';
    renderResults(data);
    // Start live price polling
    fetchLivePrice();
    liveTimer = setInterval(fetchLivePrice, 30000);
  } catch(err) {
    loader.style.display   = 'none';
    errorBox.style.display = 'block';
    errorBox.textContent   = '❌  ' + err.message;
  }
}

async function fetchLivePrice() {
  if (!selectedSlug) return;
  try {
    const res = await fetch(`/api/live?slug=${encodeURIComponent(selectedSlug)}&name=${encodeURIComponent(selectedName)}&_=${Date.now()}`);
    const d = await res.json();
    if (d.error || d.price === null) {
      const lp = document.getElementById('livePrice');
      if (lp) lp.innerHTML = '<span style="color:var(--muted);font-size:12px">Live N/A</span>';
      return;
    }
    const lp = document.getElementById('livePrice');
    if (!lp) return;
    const chg = d.change_pct || 0;
    const sign = chg >= 0 ? '+' : '';
    const cls = chg >= 0 ? 'green' : 'red';
    lp.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--text)">₹${Number(d.price).toFixed(2)}</span>
        <span style="font-family:'DM Mono',monospace;font-size:14px;color:var(--${cls})">${sign}${chg.toFixed(2)}%</span>
        <span style="font-size:11px;color:var(--muted)">${d.source || 'Live'}</span>
      </div>
      <div style="display:flex;gap:16px;margin-top:6px;font-size:11px;color:var(--muted)">
        ${d.day_high ? `<span>High: ₹${d.day_high.toFixed(2)}</span>` : ''}
        ${d.day_low ? `<span>Low: ₹${d.day_low.toFixed(2)}</span>` : ''}
        ${d.volume ? `<span>Vol: ${(d.volume/1e5).toFixed(0)}L</span>` : ''}
      </div>
    `;
  } catch(e) {
    // silent fail
  }
}

// ── RENDER ──
function fmt(v, suffix='', dp=1) {
  if (v === null || v === undefined) return 'N/A';
  return Number(v).toFixed(dp) + suffix;
}

function numColor(v, good='>', threshold=0) {
  if (v === null || v === undefined) return '';
  if (good === '>') return v > threshold ? 'green' : v < 0 ? 'red' : 'amber';
  return v < threshold ? 'green' : v > threshold * 2 ? 'red' : 'amber';
}

function scoreClass(s) {
  return s >= 8 ? 'green' : s >= 6 ? 'amber' : 'red';
}

function renderSeries(series, label) {
  if (!series || !series.length) return '<tr><td>' + label + '</td><td colspan="10" style="color:var(--muted)">N/A</td></tr>';
  const last8 = series.slice(-8);
  return `<tr>
    <td>${label}</td>
    ${last8.map(d => `<td>${d.value !== null ? Math.round(d.value).toLocaleString() : '—'}</td>`).join('')}
  </tr>`;
}

      <div style="display:grid;grid-template-columns:1fr;gap:6px">
        ${A.twenty_point_checklist.checklist.map(item => {
          const wMap = {high: '🔴 High', medium: '🟡 Medium', low: '⚪ Low'};
          return `
          <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:${item.pass ? 'rgba(34,197,94,0.04)' : 'rgba(239,68,68,0.04)'};border:1px solid ${item.pass ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)'}">
            <div style="font-size:16px;flex-shrink:0">${item.pass ? '✅' : '❌'}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <span style="font-weight:600;font-size:12px;color:var(--acc)">#${item.point}</span>
                <span style="font-weight:600;font-size:13px">${item.category}</span>
                <span style="font-size:10px;color:var(--muted);background:var(--bg3);padding:1px 6px;border-radius:4px">${wMap[item.weight] || item.weight}</span>
              </div>
              <div style="font-size:11px;color:var(--muted);margin-top:1px">${item.question}</div>
              <div style="font-size:11px;color:${item.pass ? 'var(--green)' : 'var(--red)'};margin-top:1px">${item.detail}</div>
            </div>
          </div>`;
        }).join('')}
      </div>` : '<div style="color:var(--muted);font-size:14px">Insufficient data for 20-point framework</div>'}
    </div>

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <!-- NEW: BUY CONFIRMATION GATE -->
    <!-- ════════════════════════════════════════════════════════════════════ -->
    <div class="section-label fade-in">🎯 Buy Confirmation Gate</div>
    ${A.buy_confirmation ? `
    <div class="card fade-in" style="text-align:center;border:2px solid ${A.buy_confirmation.buy_signal ? 'var(--green)' : 'var(--red)'};background:${A.buy_confirmation.buy_signal ? 'rgba(34,197,94,0.04)' : 'rgba(239,68,68,0.04)'}">
      <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;margin-bottom:12px;color:${A.buy_confirmation.buy_signal ? 'var(--green)' : 'var(--red)'}">
        ${A.buy_confirmation.buy_signal ? '✅ BUY SIGNAL' : '🔴 AVOID SIGNAL'}
      </div>
      <div style="font-size:15px;color:var(--muted);margin-bottom:20px;padding:10px 16px;background:var(--bg3);border-radius:10px;display:inline-block">
        ${A.buy_confirmation.final_verdict}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:left">
        <div>
          <div style="font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;font-weight:700">✅ Reasons to Buy (${A.buy_confirmation.reasons_to_buy.length})</div>
          ${A.buy_confirmation.reasons_to_buy.length > 0 ? A.buy_confirmation.reasons_to_buy.map(r => `
            <div style="font-size:12px;padding:6px 10px;margin-bottom:4px;background:rgba(34,197,94,0.06);border-radius:6px;color:var(--text)">${r}</div>
          `).join('') : '<div style="font-size:12px;color:var(--muted)">None</div>'}
        </div>
        <div>
          <div style="font-size:11px;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;font-weight:700">❌ Reasons to Avoid (${A.buy_confirmation.reasons_to_avoid.length})</div>
          ${A.buy_confirmation.reasons_to_avoid.length > 0 ? A.buy_confirmation.reasons_to_avoid.map(r => `
            <div style="font-size:12px;padding:6px 10px;margin-bottom:4px;background:rgba(239,68,68,0.06);border-radius:6px;color:var(--text)">${r}</div>
          `).join('') : '<div style="font-size:12px;color:var(--muted)">None</div>'}
        </div>
      </div>
    </div>` : '<div class="card fade-in" style="color:var(--muted)">Insufficient data for buy confirmation</div>'}

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <!-- NEW: INDUSTRY, MANAGEMENT & ECONOMIC ASSESSMENT -->
    <!-- ════════════════════════════════════════════════════════════════════ -->
    <div class="section-label fade-in">🏭 Industry & Management Assessment</div>
    <div class="grid-3 fade-in">
      <div class="card">
        <div class="card-title">📈 Industry Outlook</div>
        ${A.industry_future ? `
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:8px">
          <span style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:${A.industry_future.score >= 7 ? 'var(--green)' : A.industry_future.score >= 5 ? 'var(--amber)' : 'var(--red)'}">${A.industry_future.score}/10</span>
          <span style="font-size:13px;font-weight:600;color:${A.industry_future.score >= 7 ? 'var(--green)' : A.industry_future.score >= 5 ? 'var(--amber)' : 'var(--red)'}">${A.industry_future.label}</span>
        </div>
        <div style="font-size:12px;color:var(--muted)">${A.industry_future.detail}</div>` : '<div style="color:var(--muted);font-size:12px">Insufficient data</div>'}
      </div>
      <div class="card">
        <div class="card-title">👔 Management Quality</div>
        ${A.management_quality ? `
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:8px">
          <span style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:${A.management_quality.score >= 7 ? 'var(--green)' : A.management_quality.score >= 5 ? 'var(--amber)' : 'var(--red)'}">${A.management_quality.score}/10</span>
          <span style="font-size:13px;font-weight:600;color:${A.management_quality.score >= 7 ? 'var(--green)' : A.management_quality.score >= 5 ? 'var(--amber)' : 'var(--red)'}">${A.management_quality.label}</span>
        </div>
        ${A.management_quality.reasons && A.management_quality.reasons.length > 0 ? `<div style="margin-bottom:6px">${A.management_quality.reasons.map(r => `<div style="font-size:11px;color:var(--green);padding:2px 0">✅ ${r}</div>`).join('')}</div>` : ''}
        ${A.management_quality.flags && A.management_quality.flags.length > 0 ? `<div>${A.management_quality.flags.map(f => `<div style="font-size:11px;color:var(--red);padding:2px 0">⚠️ ${f}</div>`).join('')}</div>` : ''}
        ` : '<div style="color:var(--muted);font-size:12px">Insufficient data</div>'}
      </div>
      <div class="card">
        <div class="card-title">🌍 Economic Sensitivity</div>
        ${A.economic_sensitivity ? `
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:8px">
          <span style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:${A.economic_sensitivity.score >= 7 ? 'var(--green)' : A.economic_sensitivity.score >= 5 ? 'var(--amber)' : 'var(--red)'}">${A.economic_sensitivity.score}/10</span>
          <span style="font-size:13px;font-weight:600;color:${A.economic_sensitivity.score >= 7 ? 'var(--green)' : A.economic_sensitivity.score >= 5 ? 'var(--amber)' : 'var(--red)'}">${A.economic_sensitivity.label}</span>
        </div>
        ${A.economic_sensitivity.warnings && A.economic_sensitivity.warnings.length > 0 ? `<div>${A.economic_sensitivity.warnings.map(w => `<div style="font-size:11px;color:var(--amber);padding:2px 0">⚠️ ${w}</div>`).join('')}</div>` : '<div style="font-size:11px;color:var(--green)">✅ Low economic sensitivity</div>'}
        ` : '<div style="color:var(--muted);font-size:12px">Insufficient data</div>'}
      </div>
    </div>

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <!-- NEW: INSTITUTIONAL INTEREST -->
    <!-- ════════════════════════════════════════════════════════════════════ -->
    <div class="section-label fade-in">🏦 Institutional Activity</div>
    <div class="grid-2 fade-in">
      <div class="card">
        <div class="card-title">🏦 Institutional Interest</div>
        ${A.institutional_assessment ? `
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:8px">
          <span style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:${A.institutional_assessment.score >= 7 ? 'var(--green)' : A.institutional_assessment.score >= 5 ? 'var(--amber)' : 'var(--red)'}">${A.institutional_assessment.score}/10</span>
        </div>
        <div style="font-size:13px;color:var(--text)">${A.institutional_assessment.detail}</div>` : '<div style="color:var(--muted);font-size:12px">Insufficient data</div>'}
      </div>
      <div class="card" style="background:rgba(79,142,247,0.04);border:2px solid rgba(79,142,247,0.15)">
        <div class="card-title" style="color:var(--acc)">📌 Final Investing Truth</div>
        <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.5">"A good stock = Strong business + Strong financials + Good management + Fair valuation."</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.5">Beginners ask: "Will stock go up tomorrow?"<br>Professionals ask: "Will this business become much larger in 5-10 years?"</div>
        <div style="margin-top:12px;font-size:11px;color:var(--acc)">Based on 20-Point Investment Framework</div>
      </div>
    </div>
  `;
}

function downloadPDF() {
  if (!selectedSlug) return;
  window.location.href = `/api/pdf?slug=${encodeURIComponent(selectedSlug)}&name=${encodeURIComponent(selectedName)}`;
}
</script>
</body>
</html>
